[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"

# Todas as chamadas à API passam por uma única função (espelha o
# padrão "google.script.run -> Code.gs" do projeto original).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA: qualquer rota desconhecida cai no index.html (o routing é feito
# em JS no cliente, tal como na versão Apps Script).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';"
# NOTA: não foi definido aqui um bloco [[headers]] estático para "/api".
# O Cache-Control dessse endpoint já é definido dinamicamente, por ação,
# dentro de netlify/functions/api.js (ver PERF-04) — um header estático
# aqui poderia entrar em conflito/sobrepor-se de forma imprevisível ao
# header definido pela própria function numa rota com rewrite.
